name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Only run after CI passes on push to main
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    if: github.event_name == 'push'
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: [ci]
    if: always() && (needs.ci.result == 'success' || github.event_name == 'workflow_dispatch')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

  deploy:
    needs: [build-and-push]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment placeholder
        run: |
          echo "Image built and pushed: ghcr.io/${{ github.repository }}:${{ github.sha }}"
          echo "Deploy step is a placeholder — configure one of the options below."

      # ---------------------------------------------------------------
      # Option 1: Railway
      # - Install the Railway CLI and trigger a deployment:
      #   - run: npm install -g @railway/cli
      #   - run: railway up --service string-free
      #   env:
      #     RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
      # ---------------------------------------------------------------

      # ---------------------------------------------------------------
      # Option 2: Render
      # - Trigger a deploy hook via curl:
      #   - run: curl -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}"
      # ---------------------------------------------------------------

      # ---------------------------------------------------------------
      # Option 3: Google Cloud Run
      # - Authenticate and deploy:
      #   - uses: google-github-actions/auth@v2
      #     with:
      #       credentials_json: ${{ secrets.GCP_SA_KEY }}
      #   - uses: google-github-actions/deploy-cloudrun@v2
      #     with:
      #       service: string-free
      #       region: us-central1
      #       image: ghcr.io/${{ github.repository }}:${{ github.sha }}
      # ---------------------------------------------------------------

      - name: Post deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Image:** ghcr.io/${{ github.repository }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Commit:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
